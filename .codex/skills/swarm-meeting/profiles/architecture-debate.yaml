{
  "summary": "Use for design reviews where platform boundaries and semantic correctness are central.",
  "meeting_style": "architecture_debate",
  "diversity_mode": "medium-high",
  "max_agents": 6,
  "required_roles": [
    "moderator",
    "skeptic",
    "maximalist",
    "retrieval-architect",
    "granary-workflow-lead",
    "semantic-purist"
  ],
  "optional_roles": [
    "pragmatist",
    "context-economist",
    "workflow-conservative"
  ],
  "debate_rounds": 2,
  "require_objection_round": true,
  "require_recommendation": true,
  "output_style": "markdown",
  "timebox": "medium",
  "biases": {
    "prioritize_mvp": false,
    "prioritize_operational_simplicity": true,
    "prioritize_context_efficiency": true
  },
  "memo_constraints": {
    "max_points_per_role": 6,
    "prefer_short_paragraphs": true
  }
}
